# TizenClaw Binary Repository Configuration
#
# Used by deploy.sh to set up on-device repos for installing
# runtime dependencies (e.g., python3, python3-base, libpython3).
#
# Format: key = value
# Configure base and platform repo URLs for your target snapshot.

[repos]
# Tizen Base repository (core OS packages)
base = http://download.tizen.org/snapshots/TIZEN/Tizen-9.0/Tizen-9.0-Base/latest/repos/standard/packages/

# Tizen Platform repository (platform-specific packages)
platform = http://download.tizen.org/snapshots/TIZEN/Tizen-9.0/Tizen-9.0-Unified/latest/repos/standard/packages/
