# TizenClaw Python Lint Configuration (ruff)
# https://docs.astral.sh/ruff/

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import ordering)
    "UP",   # pyupgrade
]
ignore = [
    "E501", # line too long (handled separately)
    "E402", # module-level import not at top (ctypes usage)
]

[lint.isort]
known-first-party = ["tizen_capi_utils"]

[format]
line-length = 100
